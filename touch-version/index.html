<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Awesome Game - Dodge Masters TOUCH</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            padding: 10px;
            overflow: hidden;
        }
        
        h1 {
            color: #00ff00;
            margin: 10px 0;
            font-size: 24px;
            text-shadow: 0 0 10px #00ff00;
        }
        
        #p5-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
        }
        
        canvas {
            border: 3px solid #00ff00;
            box-shadow: 0 0 20px #00ff00;
            max-width: 100vw;
            max-height: 50vh;
        }
        
        .info {
            color: #00ff00;
            font-size: 16px;
            margin: 10px 0;
            text-align: center;
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 10px 0;
            max-width: 100%;
            padding: 10px;
            background: rgba(0, 255, 0, 0.1);
            border: 2px solid #00ff00;
            border-radius: 10px;
        }
        
        .button-touch {
            padding: 20px;
            font-size: 18px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.1s;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .button-touch:active {
            background: #00cc00;
            transform: scale(0.95);
        }
        
        .button-touch.wide {
            grid-column: 1 / -1;
        }
        
        #gameStatus {
            font-size: 18px;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 0 0 5px #ffff00;
        }
    </style>
</head>
<body>
    <h1>🎮 DODGE MASTERS 🎮</h1>
    
    <div id="p5-container"></div>
    
    <div class="info">
        <p id="gameStatus">Tocca SU per iniziare!</p>
    </div>
    
    <div class="controls-grid">
        <button class="button-touch" ontouchstart="moveUp()" ontouchend="stopMove()">⬆️ SU</button>
        <button class="button-touch" ontouchstart="activateShield()" ontouchend="stopMove()">🛡️ SCUDO</button>
        <button class="button-touch" ontouchstart="restartGame()" ontouchend="stopMove()">🔄 RICOMINCIA</button>
        
        <button class="button-touch" ontouchstart="moveLeft()" ontouchend="stopMove()">⬅️ SX</button>
        <button class="button-touch" ontouchstart="doNothing()" ontouchend="stopMove()">◉</button>
        <button class="button-touch" ontouchstart="moveRight()" ontouchend="stopMove()">DX ➡️</button>
        
        <button class="button-touch wide" ontouchstart="moveDown()" ontouchend="stopMove()">⬇️ GIU</button>
    </div>
    
    <script src="sketch_touch.js"></script>
</body>
</html>
